# Default values for cloudcost-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of replicas
replicaCount: 1

image:
  # -- Image to use for deploying
  repository: grafana/cloudcost-exporter
  # -- Pull policy for the image
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- Secrets to use for pulling the image
imagePullSecrets: []

# -- Override the name of the release
nameOverride: ""

# -- Container port name
portName: http

# -- Override the full name of the chart and release
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- Annotations to add to the pod
podAnnotations: {}

# -- Additional labels to add to the pod
podLabels: {}

# -- Annotations to add to the Deployment object
deploymentAnnotations: {}

# -- Container arguments, usually to configure the deployment per CSP
containerArgs: []

# -- Additional environment variables for the container (list of `name`/`value`
# or `name`/`valueFrom` entries)
extraEnv: []
  # - name: AWS_REGION
  #   value: us-east-1
  # - name: SECRET_TOKEN
  #   valueFrom:
  #     secretKeyRef:
  #       name: my-secret
  #       key: token

# -- Sources to populate environment variables from (list of `configMapRef`/`secretRef`)
extraEnvFrom: []
  # - secretRef:
  #     name: cloudcost-credentials

securityContext:
  # -- Filesystem group to associate for each pod
  fsGroup: 10001

service:
  # -- Service type
  type: ClusterIP
  # -- Service port
  port: 8080
  # -- Service protocol
  protocol: TCP

resources:
  limits:
    # -- CPU limit
    cpu: "2"
    # -- Memory limit
    memory: 2Gi
  requests:
    # -- CPU request
    cpu: "1"
    # -- Memory request
    memory: 1Gi

# -- Liveness probe for the container. When left empty the chart renders its
# default probe: an HTTP GET on `/` against the `portName` port with Kubernetes'
# default timings. Set this to any probe shape (httpGet, tcpSocket, exec, grpc)
# and/or timing fields to override it.
# @default -- HTTP GET `/` on the `portName` port (see commented example below)
livenessProbe: {}
  # httpGet:
  #   path: /
  #   port: http
  # initialDelaySeconds: 0
  # periodSeconds: 10
  # timeoutSeconds: 1
  # failureThreshold: 3
  # successThreshold: 1

# -- Readiness probe for the container. Behaves like `livenessProbe`: empty
# renders the chart default (HTTP GET `/` on the `portName` port).
# @default -- HTTP GET `/` on the `portName` port (see commented example below)
readinessProbe: {}
  # httpGet:
  #   path: /
  #   port: http
  # initialDelaySeconds: 0
  # periodSeconds: 10
  # timeoutSeconds: 1
  # failureThreshold: 3
  # successThreshold: 1

# -- Startup probe for the container. Disabled by default. Useful when many
# `--aws.services` are enabled: the initial pricing-map refresh from the AWS
# Pricing API can exceed the liveness threshold and crashloop the pod, so a
# startup probe with a generous `failureThreshold` keeps liveness from firing
# during init.
# @default -- `{}` (disabled)
startupProbe: {}
  # httpGet:
  #   path: /
  #   port: http
  # periodSeconds: 5
  # failureThreshold: 60

# -- Node selector
nodeSelector: {}

# -- List of node taints to tolerate
tolerations: []

# -- Node/pod affinities
affinity: {}

# -- Pod topology spread constraints
topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: ScheduleAnyway
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: cloudcost-exporter

# -- Priority class name for the pod
priorityClassName: ""

# -- Init containers to add to the pod
initContainers: []

# -- Additional sidecar containers to add to the pod
extraContainers: []

# -- List of volumes
volumes: []

# -- List of volume mounts
volumeMounts: []

# -- Seconds a pod should be ready to be considered available
minReadySeconds: 10

# -- Number of old versions to retain to allow rollback
revisionHistoryLimit: 10
