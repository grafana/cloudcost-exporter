name: Build on Feature Branch

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  build-and-export-digest:
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runnerType: ubuntu-24.04-arm
            platform: linux/arm64
          - runnerType: ubuntu-24.04
            platform: linux/amd64
    runs-on: ${{ matrix.runnerType }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build Image (no push)
        id: build
        uses: grafana/shared-workflows/actions/docker-build-push-image@c66d74df41cf4ed28a90da1d91c263f9d1609a21 # docker-build-push-image/v0.3.4
        with:
          registries: dockerhub
          platforms: ${{ matrix.platform }}
          outputs: "type=image,push-by-digest=true,name-canonical=true,push=false"
          push: false
          tags: |
            type=raw,value=test
          include-tags-in-push: false

      - name: Export Docker Digest
        id: export
        uses: grafana/shared-workflows/actions/docker-export-digest@015e80562a04751edab840263e21561807c88c76 # docker-export-digest/v0.1.4
        with:
          digest: ${{ steps.build.outputs.digest }}
          platform: ${{ matrix.platform }}
