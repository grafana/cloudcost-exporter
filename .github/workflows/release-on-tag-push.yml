name: Release on Tag Push

on:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  tag-and-goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate tag is semver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not a valid semver tag. This workflow only processes image release tags (e.g. v0.21.0). Helm chart tags (e.g. vcloudcost-exporter-1.2.0) are ignored."
            exit 1
          fi
          echo "Tag '$TAG' is valid semver"

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using pushed tag: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.0'
          cache: false

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: 2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-export-digest:
    needs: tag-and-goreleaser
    permissions:
      contents: read
      id-token: write
    outputs:
      images: ${{ steps.build.outputs.images }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runnerType: ubuntu-24.04-arm
            platform: linux/arm64
          - runnerType: ubuntu-24.04
            platform: linux/amd64
    runs-on: ${{ matrix.runnerType }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.tag-and-goreleaser.outputs.version }}
          fetch-depth: 0

      - name: Build and Push Image
        id: build
        uses: grafana/shared-workflows/actions/docker-build-push-image@21ae57f82e5256e5a418406388926d4ba24bccf2 # docker-build-push-image/v0.3.2
        with:
          registries: dockerhub
          platforms: ${{ matrix.platform }}
          outputs: "type=image,push-by-digest=true,name-canonical=true,push=true"
          push: true
          tags: |
            type=semver,pattern=v{{ version }}
          include-tags-in-push: false
        env:
          version: ${{ needs.tag-and-goreleaser.outputs.version }}

      - name: Export Docker Digest
        id: export
        uses: grafana/shared-workflows/actions/docker-export-digest@4d53725e812211a661bd89c8f4925c33584e1f45 # docker-export-digest/v0.1.2
        with:
          digest: ${{ steps.build.outputs.digest }}
          platform: ${{ matrix.platform }}

  push-manifest:
    needs: [tag-and-goreleaser, build-and-export-digest]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Multi-Arch Digests, Construct and Upload Manifest
        uses: grafana/shared-workflows/actions/docker-import-digests-push-manifest@943e0dabf320bf0762834fc99fb3927e30f843af # docker-import-digests-push-manifest/v0.2.0
        with:
          images: ${{ needs.build-and-export-digest.outputs.images }}
          push: true
          tags: |
            type=semver,pattern=v{{ version }}
        env:
          version: ${{ needs.tag-and-goreleaser.outputs.version }}

  deploy:
    needs: [tag-and-goreleaser, push-manifest]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Trigger Argo Workflow
        uses: grafana/shared-workflows/actions/trigger-argo-workflow@b513eb1dfd9becfa671a41e55063cdd5c0a08031 # trigger-argo-workflow/v1.2.2
        with:
          namespace: platform-monitoring-cd
          workflow_template: cloudcost-exporter
          parameters: |
            imageName=grafana/cloudcost-exporter
            dockertag=${{ needs.tag-and-goreleaser.outputs.version }}
            prCommentContext= Triggered by release ${{ needs.tag-and-goreleaser.outputs.version }} in grafana/cloudcost-exporter
            commit_author=grafana-delivery-bot
