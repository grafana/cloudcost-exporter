name: Release on Tag Push

on:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  tag-and-goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate tag is semver
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not a valid semver tag. This workflow only processes image release tags (e.g. v0.21.0). Helm chart tags (e.g. vcloudcost-exporter-1.2.0) are ignored."
            exit 1
          fi
          echo "Tag '$TAG' is valid semver"

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using pushed tag: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release notes for GoReleaser
        run: |
          cp "${{ steps.changelog.outputs.changelog }}" /tmp/goreleaser-release-notes.md
          rm -rf git-cliff/

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: 2
          args: release --clean --release-notes=/tmp/goreleaser-release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-export-digest:
    needs: tag-and-goreleaser
    permissions:
      contents: read
      id-token: write
    outputs:
      images: ${{ steps.build.outputs.images }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runnerType: ubuntu-24.04-arm
            platform: linux/arm64
          - runnerType: ubuntu-24.04
            platform: linux/amd64
    runs-on: ${{ matrix.runnerType }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
          ref: ${{ needs.tag-and-goreleaser.outputs.version }}
          fetch-depth: 0

      - name: Build and Push Image
        id: build
        uses: grafana/shared-workflows/actions/docker-build-push-image@c66d74df41cf4ed28a90da1d91c263f9d1609a21 # docker-build-push-image/v0.3.4
        with:
          registries: gar
          gar-environment: prod
          gar-repository: dockerhub-cloudcost-exporter-prod-mirror
          platforms: ${{ matrix.platform }}
          outputs: "type=image,push-by-digest=true,name-canonical=true,push=true"
          push: true
          tags: |
            type=semver,pattern=v{{ version }}
          include-tags-in-push: false
        env:
          version: ${{ needs.tag-and-goreleaser.outputs.version }}

      - name: Export Docker Digest
        id: export
        uses: grafana/shared-workflows/actions/docker-export-digest@015e80562a04751edab840263e21561807c88c76 # docker-export-digest/v0.1.4
        with:
          digest: ${{ steps.build.outputs.digest }}
          platform: ${{ matrix.platform }}

  push-manifest:
    needs: [tag-and-goreleaser, build-and-export-digest]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Multi-Arch Digests, Construct and Upload Manifest
        uses: grafana/shared-workflows/actions/docker-import-digests-push-manifest@45a721b0bca7964cd07336db81b3cb744b386ab6 # docker-import-digests-push-manifest/v0.2.1
        with:
          images: ${{ needs.build-and-export-digest.outputs.images }}
          push: true
          tags: |
            type=semver,pattern=v{{ version }}
        env:
          version: ${{ needs.tag-and-goreleaser.outputs.version }}

  update-helm-chart:
    needs: [tag-and-goreleaser, push-manifest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Open Helm chart bump PR
        uses: ./.github/actions/update-helm-chart
        with:
          version: ${{ needs.tag-and-goreleaser.outputs.version }}

  deploy:
    needs: [tag-and-goreleaser, push-manifest]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Trigger Argo Workflow
        uses: grafana/shared-workflows/actions/trigger-argo-workflow@8269e9362f30c5458c2cad54510ea74fd053920c # trigger-argo-workflow/v1.3.0
        with:
          namespace: platform-monitoring-cd
          workflow_template: cloudcost-exporter
          parameters: |
            imageName=grafana/cloudcost-exporter
            dockertag=${{ needs.tag-and-goreleaser.outputs.version }}
            prCommentContext= Triggered by release ${{ needs.tag-and-goreleaser.outputs.version }} in grafana/cloudcost-exporter
            commit_author=grafana-delivery-bot
